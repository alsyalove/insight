<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotebookLM - Insight Forge</title>
  
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <div class="hero">
    <div class="hero-badge">◉ Panduan Lengkap</div>
    <h1>NotebookLM<br><em>sebagai Asisten Riset</em></h1>
    <p class="hero-desc">Dari 20 jurnal jadi satu sumber terstruktur, sampai Audio Overview yang bisa kamu dengerin sambil ngopi. Semua prompt siap pakai.</p>
  </div>

  <nav class="nav-tabs">
    <button class="tab-btn active" onclick="switchTab('start')" data-tab="start">
      <span class="tab-dot" style="background:#c07a1a"></span>Mulai di Sini
    </button>
    <button class="tab-btn" onclick="switchTab('setup')" data-tab="setup">
      <span class="tab-dot" style="background:#1a6b5a"></span>Setup Notebook
    </button>
    <button class="tab-btn" onclick="switchTab('extract')" data-tab="extract">
      <span class="tab-dot" style="background:#5a3ab8"></span>Ekstrak 20 Jurnal
    </button>
    <button class="tab-btn" onclick="switchTab('prompts')" data-tab="prompts">
      <span class="tab-dot" style="background:#b84a2a"></span>Prompt Bank
    </button>
    <button class="tab-btn" onclick="switchTab('audio')" data-tab="audio">
      <span class="tab-dot" style="background:#2d6b1a"></span>Audio Overview
    </button>
  </nav>

  <div class="content-area">
    <div id="tab-start" class="tab-panel active">
      <p class="intro-text">"NotebookLM bukan sekadar chatbot — ini adalah second brain yang membaca semua sumbermu sebelum menjawab."</p>
      </div>
    
    </div>

  <script src="../assets/forge.js"></script>

</body>
</html>
